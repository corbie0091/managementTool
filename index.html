<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방문 기록 관리</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: #e2e0d8;
  --border2: #ccc9be;
  --text: #1a1917;
  --text2: #6b6860;
  --text3: #9b9890;
  --accent: #2d4a3e;
  --accent-light: #e8f0ec;
  --accent2: #c84b2f;
  --danger-light: #fdf0ed;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 1px 4px rgba(0,0,0,0.07);
  --shadow-lg: 0 4px 20px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
button,input,select,textarea{font-family:inherit}
.wrap{max-width:980px;margin:0 auto;padding:24px 16px}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:12px}
.topbar h1{font-size:20px;font-weight:700;letter-spacing:-0.5px}
.topbar h1 span{color:var(--accent)}
.month-nav{display:flex;align-items:center;gap:8px}
.mnbtn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.mnbtn:hover{background:var(--surface2)}
.month-label{font-size:15px;font-weight:700;min-width:110px;text-align:center}
.sync-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text2);font-size:12px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);display:inline-block;margin-right:6px}
.sync-bar.ok .sync-dot{background:var(--accent)}
.sync-bar.err{border-color:#f0b8aa;background:var(--danger-light);color:var(--accent2)}
.sync-bar.err .sync-dot{background:var(--accent2)}
.tabs{display:flex;gap:2px;background:var(--surface2);border-radius:var(--radius);padding:3px;margin-bottom:20px;width:fit-content}
.tab{padding:7px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all 0.15s}
.tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}
.insight-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
.top-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow);min-height:132px;position:relative;overflow:hidden}
.top-card:first-child{border-color:#dbc36a;background:#fffaf0}
.top-rank{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:10px}
.top-card:first-child .top-rank{color:#9a7815}
.top-name{font-size:17px;font-weight:700;line-height:1.25;margin-bottom:4px}
.top-region{font-size:12px;color:var(--text3);margin-bottom:12px}
.top-count{display:flex;align-items:flex-end;gap:4px;color:var(--accent)}
.top-count strong{font-size:30px;line-height:1;font-weight:700}
.top-count span{font-size:12px;font-weight:700;padding-bottom:3px}
.top-share{position:absolute;right:14px;bottom:12px;font-size:12px;color:var(--text3);font-weight:700}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px}
.metric-label{font-size:11px;color:var(--text2);font-weight:700;margin-bottom:5px}
.metric-value{font-size:22px;font-weight:700;color:var(--text)}
.metric-sub{font-size:11px;color:var(--text3);margin-top:2px}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.insight-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.panel-title{font-size:14px;font-weight:700;margin-bottom:10px}
.mini-list{display:flex;flex-direction:column;gap:8px}
.mini-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;font-size:13px}
.mini-main{min-width:0}
.mini-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-sub{font-size:11px;color:var(--text3);margin-top:1px}
.mini-value{font-weight:700;color:var(--accent)}
.mini-bar{grid-column:1/-1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.mini-fill{height:100%;background:var(--accent);border-radius:3px}
.empty-tight{text-align:center;padding:14px;color:var(--text3);font-size:13px}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fbtn{padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text2);transition:all 0.15s;font-weight:500}
.fbtn:hover{border-color:var(--border2);color:var(--text)}
.fbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cal-wrap,.rank-table-wrap{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
.cal-head-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.cal-head-cell{text-align:center;padding:10px 4px;font-size:12px;font-weight:700;color:var(--text2)}
.cal-head-cell:first-child{color:var(--accent2)}
.cal-head-cell:last-child{color:#2d5fa0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:76px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:6px;cursor:pointer;transition:background 0.12s;position:relative}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--surface2)}
.cal-cell.empty{cursor:default;background:var(--bg)}
.cal-cell.empty:hover{background:var(--bg)}
.cal-cell.today{background:var(--accent-light)}
.cal-cell.today:hover{background:#dde9e3}
.day-num{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.cal-cell:nth-child(7n+1) .day-num{color:var(--accent2)}
.cal-cell:nth-child(7n) .day-num{color:#2d5fa0}
.dots{display:flex;flex-wrap:wrap;gap:3px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.visit-names{display:flex;flex-direction:column;gap:3px;margin-top:2px}
.visit-name{display:block;max-width:100%;padding:2px 5px;border-radius:5px;background:var(--surface2);color:var(--text);font-size:10px;font-weight:600;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.visit-more{font-size:10px;color:var(--text3);font-weight:700;line-height:1.2;padding-left:2px}
.visit-count{position:absolute;bottom:4px;right:6px;font-size:10px;color:var(--text3);font-weight:600}
.has-comment{position:absolute;top:5px;right:6px;font-size:10px;opacity:0.7}
.rank-table{width:100%;border-collapse:collapse}
.rank-table thead tr{border-bottom:2px solid var(--border)}
.rank-table th{padding:10px 14px;font-size:12px;font-weight:700;color:var(--text2);text-align:left;white-space:nowrap;background:var(--surface2)}
.rank-table th.num-col{text-align:center;width:44px}
.rank-table th.cnt-col{text-align:center;width:60px}
.rank-table th.bar-col{min-width:120px}
.rank-table td{padding:9px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle}
.rank-table tr:last-child td{border-bottom:none}
.rank-table tr:hover td{background:var(--surface2)}
.rank-table tr.clickable{cursor:pointer}
.r-num{text-align:center;font-size:13px;font-weight:700;color:var(--text3)}
.r-region{color:var(--text3);font-size:11px;margin-right:4px}
.r-cnt-cell{text-align:center}
.r-cnt-num{font-weight:700;font-size:14px;color:var(--accent)}
.r-bar-wrap{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;min-width:80px}
.r-bar{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s ease}
.r-check-cell{text-align:center;white-space:nowrap}
.check-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--text3);transition:all 0.12s;user-select:none;margin:0 1px}
.check-badge:hover{border-color:var(--accent);color:var(--accent)}
.check-badge.checked{background:var(--accent);border-color:var(--accent);color:#fff}
.r-last-visit{font-size:11px;color:var(--text3)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:none;align-items:center;justify-content:center;padding:16px}
.overlay.show{display:flex}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.modal-hdr h2{font-size:16px;font-weight:700}
.modal-close{background:var(--surface2);border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-close:hover{background:var(--border)}
.modal-body{overflow-y:auto;flex:1;padding:16px 20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-shrink:0}
.lbl{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;margin-top:14px;text-transform:uppercase;letter-spacing:0.5px}
.lbl:first-child{margin-top:0}
select,input[type=text],textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:border-color 0.15s}
select:focus,input[type=text]:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:72px;line-height:1.5}
.store-list{display:flex;flex-direction:column;gap:3px;max-height:190px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px}
.s-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;transition:background 0.1s}
.s-item:hover{background:var(--surface2)}
.s-item.sel{background:var(--accent-light)}
.s-item input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;flex-shrink:0}
.s-region{color:var(--text3);font-size:11px;margin-right:3px}
.visit-log{display:flex;flex-direction:column;gap:5px}
.v-entry{display:flex;align-items:flex-start;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm)}
.v-badge{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
.v-info{flex:1;min-width:0}
.v-store{font-size:13px;font-weight:500}
.v-comment{font-size:12px;color:var(--text2);margin-top:4px;padding:4px 8px;background:var(--surface2);border-radius:4px;line-height:1.4}
.v-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;line-height:1;padding:0 2px;flex-shrink:0}
.v-del:hover{color:var(--accent2)}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-weight:500;transition:all 0.15s}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:#243d33}
.btn-sm{padding:5px 10px;font-size:12px}
.setting-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px}
.setting-title{font-size:14px;font-weight:700;margin-bottom:12px}
.add-row{display:flex;gap:6px;margin-bottom:10px}
.add-row input{flex:1}
.item-list{display:flex;flex-direction:column;gap:4px;max-height:260px;overflow-y:auto}
.item-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px}
.item-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.item-name{flex:1}
.item-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px;padding:0 2px}
.item-del:hover{color:var(--accent2)}
.empty{text-align:center;padding:24px;color:var(--text3);font-size:13px}
.sd-stats{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.sd-stat{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 16px;text-align:center;flex:1;min-width:80px}
.sd-stat-val{font-size:22px;font-weight:700;color:var(--accent)}
.sd-stat-lbl{font-size:11px;color:var(--text2);margin-top:2px}
.sd-log{display:flex;flex-direction:column;gap:6px}
.sd-entry{padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm)}
.sd-entry-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.sd-entry-date{font-size:12px;font-weight:700;color:var(--text)}
.sd-entry-mgr{padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700}
.sd-entry-comment{font-size:12px;color:var(--text2);line-height:1.4;padding:5px 8px;background:var(--surface2);border-radius:4px;margin-top:4px}
@media (max-width:720px){
  .wrap{padding:14px 10px}
  .tabs{width:100%}
  .tab{flex:1;text-align:center;padding:8px 4px}
  .insight-grid,.metric-grid,.panel-grid{grid-template-columns:1fr}
  .cal-cell{min-height:64px;padding:5px}
  .rank-table-wrap{overflow-x:auto}
  .rank-table{min-width:650px}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>📍 <span>방문</span> 기록 관리</h1>
    <div class="month-nav">
      <button class="mnbtn" id="prevM">&#8249;</button>
      <span class="month-label" id="monthLabel"></span>
      <button class="mnbtn" id="nextM">&#8250;</button>
    </div>
  </div>

  <div class="sync-bar" id="syncBar"><span><span class="sync-dot"></span><span id="syncText">Supabase 연결 확인 중</span></span><button class="btn btn-sm" onclick="loadAll()">새로고침</button></div>

  <div class="tabs">
    <div class="tab active" data-tab="calendar">📅 달력</div>
    <div class="tab" data-tab="ranking">📊 상권 현황</div>
    <div class="tab" data-tab="insights">🏆 TOP 상권</div>
    <div class="tab" data-tab="settings">⚙️ 설정</div>
  </div>

  <div id="pane-calendar">
    <div class="filter-row" id="filterRow"></div>
    <div class="cal-wrap">
      <div class="cal-head-row">
        <div class="cal-head-cell">일</div><div class="cal-head-cell">월</div>
        <div class="cal-head-cell">화</div><div class="cal-head-cell">수</div>
        <div class="cal-head-cell">목</div><div class="cal-head-cell">금</div>
        <div class="cal-head-cell">토</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
  </div>
 <div id="pane-insights" style="display:none">
    <div class="insight-grid" id="topStores"></div>
    <div class="metric-grid" id="metricGrid"></div>
    <div class="panel-grid">
      <div class="insight-panel">
        <p class="panel-title">관리자별 방문</p>
        <div class="mini-list" id="managerInsight"></div>
      </div>
      <div class="insight-panel">
        <p class="panel-title">지역별 방문</p>
        <div class="mini-list" id="regionInsight"></div>
      </div>
      <div class="insight-panel">
        <p class="panel-title">이번 달 미방문 상권</p>
        <div class="mini-list" id="unvisitedInsight"></div>
      </div>
      <div class="insight-panel">
        <p class="panel-title">최근 방문 메모</p>
        <div class="mini-list" id="commentInsight"></div>
      </div>
    </div>
  </div>

  <div id="pane-ranking" style="display:none">
    <div class="rank-table-wrap">
      <table class="rank-table">
        <thead>
          <tr>
            <th class="num-col">#</th>
            <th>상권명</th>
            <th class="cnt-col">방문</th>
            <th class="bar-col">비율</th>
            <th>최근 방문</th>
            <th>체크</th>
          </tr>
        </thead>
        <tbody id="rankBody"></tbody>
      </table>
    </div>
  </div>

  <div id="pane-settings" style="display:none">
    <div class="setting-section">
      <p class="setting-title">관리자 관리</p>
      <div class="add-row">
        <input type="text" id="newMgr" placeholder="관리자 이름 입력">
        <button class="btn btn-primary btn-sm" onclick="addManager()">추가</button>
      </div>
      <div class="item-list" id="mgrList"></div>
    </div>
    <div class="setting-section">
      <p class="setting-title">매장 관리</p>
      <div class="add-row">
        <input type="text" id="newRegion" placeholder="지역 (예: 남부산)" style="width:110px;flex:none">
        <input type="text" id="newStore" placeholder="매장명 입력">
        <button class="btn btn-primary btn-sm" onclick="addStore()">추가</button>
      </div>
      <div class="item-list" id="storeList"></div>
    </div>
    <div class="setting-section" style="border-color:#fcd0c8">
      <p class="setting-title" style="color:var(--accent2)">데이터 관리</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-sm" onclick="seedDefaultData()">기본 관리자/매장 넣기</button>
        <button class="btn btn-sm" onclick="exportData()">📤 내보내기 (JSON)</button>
        <button class="btn btn-sm" onclick="document.getElementById('importFile').click()">📥 불러오기</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
        <button class="btn btn-sm" style="color:var(--accent2);border-color:#fcd0c8" onclick="clearVisits()">방문 기록 초기화</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="modalTitle"></h2>
      <button class="modal-close" onclick="closeModal('overlay')">✕</button>
    </div>
    <div class="modal-body">
      <div id="modalLog"></div>
      <hr class="divider">
      <p class="lbl">관리자 선택</p>
      <select id="selMgr"></select>
      <p class="lbl">매장 선택</p>
      <div class="store-list" id="modalStores"></div>
      <p class="lbl">코멘트 (선택)</p>
      <textarea id="visitComment" placeholder="방문 메모, 특이사항 등을 입력하세요..."></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('overlay')">닫기</button>
      <button class="btn btn-primary" onclick="addVisit()">기록 추가</button>
    </div>
  </div>
</div>

<div class="overlay" id="storeOverlay">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="sdTitle">상권 방문 내역</h2>
      <button class="modal-close" onclick="closeModal('storeOverlay')">✕</button>
    </div>
    <div class="modal-body" id="sdBody"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('storeOverlay')">닫기</button>
    </div>
  </div>
</div>

<script>

const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const MGR_COLORS = [
  {fg:'#2d4a3e',bg:'#e8f0ec'},{fg:'#8b3a6e',bg:'#f7e8f2'},
  {fg:'#c84b2f',bg:'#fdf0ed'},{fg:'#2d5fa0',bg:'#e8eef8'},
  {fg:'#6b4f12',bg:'#f8f0dc'},{fg:'#1a6b6b',bg:'#e0f2f2'},
  {fg:'#5c3d99',bg:'#ede8f8'},{fg:'#7a3030',bg:'#f8e8e8'}
];
const DEFAULT_MANAGERS = ['박상현','정유진','이정훈','이상철'];
const DEFAULT_STORES = [
  '남부산|서면 공구상가','남부산|서면 롯데후문','남부산|서면 영광도서',
  '남부산|전포동','남부산|양정','남부산|당감','남부산|개금','남부산|가야',
  '남부산|조방','남부산|초량','남부산|동아대','남부산|하단오거리','남부산|당리',
  '남부산|다대포 라브랜드','남부산|다대포 씨파크','남부산|신평','남부산|괴정',
  '남부산|강서구','남부산|신호동','남부산|삼익','남부산|송도','남부산|부평',
  '남부산|자갈치','남부산|남포/중앙동','남부산|영도 남항동','남부산|영도 동삼동',
  '남부산|덕천','남부산|화명','남부산|덕포/모라','남부산|만덕','남부산|구포',
  '남부산|사상터미널','남부산|감전동','남부산|동서대/주례','남부산|방통대/북부경찰서','남부산|장림'
];

let managers = [];
let stores = [];
let visits = {};
let visitRows = [];
let checks = {};
let curYear = new Date().getFullYear();
let curMonth = new Date().getMonth();
let activeFilter = 'all';
let selectedStore = null;
let currentKey = null;

const TODAY = new Date();
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function esc(s){return String(s ?? '').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function jsArg(s){return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function mgrColor(i){return MGR_COLORS[i%MGR_COLORS.length]}
function mgrIdx(n){return managers.findIndex(m=>m.name===n)}
function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function monthKey(y,m){return `${y}-${String(m+1).padStart(2,'0')}`}
function storeKey(store){return `${store.region || ''}|${store.name}`}
function splitStoreKey(key){const p=key.split('|');return {region:p.length>1?p[0]:'',name:p.length>1?p.slice(1).join('|'):key}}
function getDay(k){return visits[k]||[]}
function getMonth(y,m){
  const p=monthKey(y,m)+'-';
  return Object.entries(visits).filter(([k])=>k.startsWith(p)).flatMap(([date,v])=>v.map(row=>({...row,date})));
}
function setSync(text, state='ok'){
  const bar=document.getElementById('syncBar');
  bar.className=`sync-bar ${state}`;
  document.getElementById('syncText').textContent=text;
}
function assertConfigured(){
  if(SUPABASE_URL.startsWith('여기에_') || SUPABASE_ANON_KEY.startsWith('여기에_')){
    throw new Error('index.html 상단의 SUPABASE_URL, SUPABASE_ANON_KEY 값을 먼저 입력하세요.');
  }
}
async function run(q){
  const {data,error}=await q;
  if(error) throw error;
  return data;
}

async function loadAll(){
  try{
    assertConfigured();
    setSync('Supabase에서 데이터를 불러오는 중', '');
    const [mgrData, storeData, visitData, checkData] = await Promise.all([
      run(db.from('managers').select('*').order('sort_order').order('created_at')),
      run(db.from('stores').select('*').order('sort_order').order('created_at')),
      run(db.from('visits').select('*, managers(name), stores(region,name)').order('visit_date', {ascending:false}).order('created_at', {ascending:false})),
      run(db.from('store_checks').select('*'))
    ]);
    managers=mgrData;
    stores=storeData;
    visitRows=visitData.map(v=>({
      id:v.id,
      date:v.visit_date,
      manager_id:v.manager_id,
      store_id:v.store_id,
      manager:v.managers?.name || '삭제된 관리자',
      store: `${v.stores?.region || ''}|${v.stores?.name || '삭제된 매장'}`,
      comment:v.comment || ''
    }));
    visits={};
    visitRows.forEach(v=>{
      if(!visits[v.date]) visits[v.date]=[];
      visits[v.date].push(v);
    });
    checks={};
    checkData.forEach(c=>{
      checks[c.store_id] = checks[c.store_id] || {};
      checks[c.store_id][c.month_key] = c.count;
    });
    render();
    setSync(`Supabase 연결됨 · 관리자 ${managers.length}명 · 매장 ${stores.length}개 · 방문 ${visitRows.length}건`, 'ok');
  }catch(err){
    console.error(err);
    setSync(err.message || 'Supabase 연결 실패', 'err');
    render();
  }
}

function getCheckCount(storeId, y, m){
  const mk = monthKey(y,m);
  return checks[storeId]?.[mk] || 0;
}
async function setCheckCount(storeId, y, m, cnt){
  const mk = monthKey(y,m);
  if(cnt <= 0){
    await run(db.from('store_checks').delete().eq('store_id', storeId).eq('month_key', mk));
  }else{
    await run(db.from('store_checks').upsert({store_id:storeId,month_key:mk,count:cnt},{onConflict:'store_id,month_key'}));
  }
  await loadAll();
}

function render(){
  renderCalendar();
  renderInsights();
  renderRanking();
  renderSettings();
  renderFilters();
  document.getElementById('monthLabel').textContent = `${curYear}년 ${MONTHS[curMonth]}`;
}
  
function renderFilters(){
  let h=`<button class="fbtn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">전체</button>`;
  managers.forEach((m,i)=>{
    const c=mgrColor(i);const a=activeFilter===m.name;
    h+=`<button class="fbtn ${a?'active':''}" style="${a?`background:${c.fg};border-color:${c.fg};color:#fff`:''}" onclick="setFilter('${jsArg(m.name)}')">${esc(m.name)}</button>`;
  });
  document.getElementById('filterRow').innerHTML=h;
}
function setFilter(f){activeFilter=f;render()}
function renderCalendar(){
  const y=curYear,m=curMonth;
  const firstDay=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  let h='';
  for(let i=0;i<firstDay;i++) h+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const key=dateKey(y,m,d);
    let vs=getDay(key);
    if(activeFilter!=='all') vs=vs.filter(v=>v.manager===activeFilter);
    const isT=TODAY.getFullYear()===y&&TODAY.getMonth()===m&&TODAY.getDate()===d;
   const dots=activeFilter==='all' ? vs.slice(0,12).map(v=>{
      const idx=mgrIdx(v.manager);const c=mgrColor(idx<0?0:idx);
      return `<div class="dot" style="background:${c.fg}" title="${esc(v.manager)}"></div>`;
     }).join('') : '';
    const names=activeFilter!=='all' ? (() => {
      const list=vs.slice(0,3).map(v=>{
        const store=splitStoreKey(v.store).name;
        return `<span class="visit-name" title="${esc(store)}">${esc(store)}</span>`;
      }).join('');
      const more=vs.length>3 ? `<span class="visit-more">+${vs.length-3}개</span>` : '';
      return `<div class="visit-names">${list}${more}</div>`;
    })() : '';
    const hasComment=vs.some(v=>v.comment&&v.comment.trim());
    const cnt=vs.length>0?`<div class="visit-count">${vs.length}</div>`:'';
    const commentMark=hasComment?`<span class="has-comment" title="코멘트 있음">💬</span>`:'';
    const dnStyle=isT?`<span style="background:var(--accent);color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px">${d}</span>`:d;
    h+=`<div class="cal-cell${isT?' today':''}" onclick="openModal(${y},${m},${d})">
      <div class="day-num">${dnStyle}</div>
      <div class="dots">${dots}</div>${names}${cnt}${commentMark}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML=h;
}
  
function renderInsights(){
  const vs=getMonth(curYear,curMonth);
  const total=vs.length;
  const storeCounts={};
  const managerCounts={};
  const regionCounts={};
  const commentRows=[];

  vs.forEach(v=>{
    storeCounts[v.store_id]=(storeCounts[v.store_id]||0)+1;
    managerCounts[v.manager]=(managerCounts[v.manager]||0)+1;
    const store=stores.find(s=>s.id===v.store_id);
    const region=store?.region || '지역 없음';
    regionCounts[region]=(regionCounts[region]||0)+1;
    if(v.comment && v.comment.trim()) commentRows.push(v);
  });

  const rankedStores=stores
    .map(s=>({...s,count:storeCounts[s.id]||0}))
    .sort((a,b)=>b.count-a.count || a.name.localeCompare(b.name));
  const top3=rankedStores.slice(0,3);
  const visitedStoreCount=rankedStores.filter(s=>s.count>0).length;
  const activeManagerCount=Object.keys(managerCounts).length;
  const coverage=stores.length ? Math.round(visitedStoreCount/stores.length*100) : 0;

  document.getElementById('topStores').innerHTML=top3.map((s,i)=>{
    const share=total ? Math.round(s.count/total*100) : 0;
    const label=['1위','2위','3위'][i];
    return `<div class="top-card" onclick="openStoreDetail('${s.id}')" style="cursor:pointer">
      <div class="top-rank">${label}</div>
      <div class="top-name">${esc(s.name)}</div>
      <div class="top-region">${esc(s.region || '지역 없음')}</div>
      <div class="top-count"><strong>${s.count}</strong><span>회 방문</span></div>
      <div class="top-share">${share}%</div>
    </div>`;
  }).join('') || '<div class="empty">매장이 없습니다</div>';

  document.getElementById('metricGrid').innerHTML=`
    <div class="metric-card"><div class="metric-label">이번 달 총 방문</div><div class="metric-value">${total}</div><div class="metric-sub">선택 월 기준</div></div>
    <div class="metric-card"><div class="metric-label">방문 상권</div><div class="metric-value">${visitedStoreCount}</div><div class="metric-sub">전체 ${stores.length}개 중</div></div>
    <div class="metric-card"><div class="metric-label">커버리지</div><div class="metric-value">${coverage}%</div><div class="metric-sub">한 번 이상 방문</div></div>
    <div class="metric-card"><div class="metric-label">활동 관리자</div><div class="metric-value">${activeManagerCount}</div><div class="metric-sub">방문 기록 기준</div></div>`;

  renderMiniRank('managerInsight',
    managers.map(m=>({name:m.name,sub:'관리자',value:managerCounts[m.name]||0})).sort((a,b)=>b.value-a.value),
    total,
    '회'
  );
  renderMiniRank('regionInsight',
    Object.entries(regionCounts).map(([name,value])=>({name,sub:'지역',value})).sort((a,b)=>b.value-a.value),
    total,
    '회'
  );

  const unvisited=rankedStores.filter(s=>s.count===0).slice(0,8);
  document.getElementById('unvisitedInsight').innerHTML=unvisited.length ? unvisited.map(s=>`
    <div class="mini-row">
      <div class="mini-main"><div class="mini-name">${esc(s.name)}</div><div class="mini-sub">${esc(s.region || '지역 없음')}</div></div>
      <div class="mini-value">0회</div>
    </div>`).join('') : '<div class="empty-tight">이번 달 모든 상권을 한 번 이상 방문했습니다</div>';

  commentRows.sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('commentInsight').innerHTML=commentRows.slice(0,5).map(v=>{
    const store=splitStoreKey(v.store).name;
    const day=parseInt(v.date.split('-')[2]);
    return `<div class="mini-row">
      <div class="mini-main"><div class="mini-name">${esc(store)}</div><div class="mini-sub">${day}일 · ${esc(v.manager)} · ${esc(v.comment)}</div></div>
    </div>`;
  }).join('') || '<div class="empty-tight">이번 달 메모가 없습니다</div>';
}

function renderMiniRank(id, rows, total, suffix){
  const nonEmpty=rows.filter(r=>r.value>0).slice(0,6);
  const max=Math.max(1,...nonEmpty.map(r=>r.value));
  document.getElementById(id).innerHTML=nonEmpty.length ? nonEmpty.map(r=>{
    const pct=total ? Math.round(r.value/total*100) : 0;
    return `<div class="mini-row">
      <div class="mini-main"><div class="mini-name">${esc(r.name)}</div><div class="mini-sub">${esc(r.sub)} · ${pct}%</div></div>
      <div class="mini-value">${r.value}${suffix}</div>
      <div class="mini-bar"><div class="mini-fill" style="width:${Math.max(4,Math.round(r.value/max*100))}%"></div></div>
    </div>`;
  }).join('') : '<div class="empty-tight">이번 달 방문 기록이 없습니다</div>';
}
function renderRanking(){
  const vs=getMonth(curYear,curMonth);
  const sc={};
  vs.forEach(v=>{sc[v.store_id]=(sc[v.store_id]||0)+1});
  const maxCnt=Math.max(1,...Object.values(sc));
  let h='';
  stores.forEach((s,i)=>{
    const cnt=sc[s.id]||0;
    const barW=cnt>0?Math.max(4,Math.round(cnt/maxCnt*100)):0;
    const checkCnt=getCheckCount(s.id,curYear,curMonth);
    const dates=vs.filter(v=>v.store_id===s.id).map(v=>v.date).sort();
    const lastDate=dates.length?dates[dates.length-1].split('-')[2]+'일':'';
    let checkBadges='';
    for(let n=1;n<=5;n++){
      checkBadges+=`<span class="check-badge${checkCnt>=n?' checked':''}" onclick="event.stopPropagation();toggleCheck('${s.id}',${n})" title="${n}회 체크">${n}</span>`;
    }
    h+=`<tr class="clickable" onclick="openStoreDetail('${s.id}')">
      <td class="r-num">${i+1}</td>
      <td><span class="r-region">${esc(s.region || '')}</span>${esc(s.name)}</td>
      <td class="r-cnt-cell"><span class="r-cnt-num">${cnt}</span></td>
      <td><div class="r-bar-wrap"><div class="r-bar" style="width:${barW}%"></div></div></td>
      <td class="r-last-visit">${lastDate}</td>
      <td class="r-check-cell">${checkBadges}</td>
    </tr>`;
  });
  document.getElementById('rankBody').innerHTML=h||`<tr><td colspan="6" class="empty">매장이 없습니다</td></tr>`;
}
async function toggleCheck(storeId, n){
  const cur=getCheckCount(storeId,curYear,curMonth);
  await setCheckCount(storeId,curYear,curMonth, cur===n?n-1:n);
}
function renderSettings(){
  document.getElementById('mgrList').innerHTML=managers.map((m,i)=>{
    const c=mgrColor(i);
    return `<div class="item-row"><div class="item-dot" style="background:${c.fg}"></div><span class="item-name">${esc(m.name)}</span><button class="item-del" onclick="delManager('${m.id}')">✕</button></div>`;
  }).join('')||'<div class="empty" style="padding:8px">관리자가 없습니다</div>';
  document.getElementById('storeList').innerHTML=stores.map(s=>{
    return `<div class="item-row"><span class="item-name"><span class="s-region">${esc(s.region || '')}</span>${esc(s.name)}</span><button class="item-del" onclick="delStore('${s.id}')">✕</button></div>`;
  }).join('')||'<div class="empty" style="padding:8px">매장이 없습니다</div>';
}
async function addManager(){
  const el=document.getElementById('newMgr');const n=el.value.trim();
  if(!n||managers.some(m=>m.name===n))return;
  await run(db.from('managers').insert({name:n,sort_order:managers.length}));
  el.value='';
  await loadAll();
}
async function delManager(id){
  const m=managers.find(x=>x.id===id);
  if(!m || !confirm(`"${m.name}" 관리자를 삭제할까요? 관련 방문 기록도 삭제됩니다.`))return;
  await run(db.from('managers').delete().eq('id',id));
  await loadAll();
}
async function addStore(){
  const r=document.getElementById('newRegion').value.trim();
  const n=document.getElementById('newStore').value.trim();
  if(!n || stores.some(s=>s.region===r&&s.name===n))return;
  await run(db.from('stores').insert({region:r,name:n,sort_order:stores.length}));
  document.getElementById('newRegion').value='';
  document.getElementById('newStore').value='';
  await loadAll();
}
async function delStore(id){
  const s=stores.find(x=>x.id===id);
  if(!s || !confirm(`"${s.name}" 매장을 삭제할까요? 관련 방문 기록도 삭제됩니다.`))return;
  await run(db.from('stores').delete().eq('id',id));
  await loadAll();
}
function openModal(y,m,d){
  currentKey=dateKey(y,m,d);selectedStore=null;
  document.getElementById('modalTitle').textContent=`${y}년 ${MONTHS[m]} ${d}일`;
  document.getElementById('selMgr').innerHTML=managers.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('');
  document.getElementById('visitComment').value='';
  renderModalLog();renderModalStores();
  document.getElementById('overlay').classList.add('show');
}
function renderModalLog(){
  const vs=getDay(currentKey);
  if(!vs.length){document.getElementById('modalLog').innerHTML='<p style="color:var(--text3);font-size:13px">방문 기록이 없습니다</p>';return}
  let h='<div class="visit-log">';
  vs.forEach(v=>{
    const idx=mgrIdx(v.manager);const c=mgrColor(idx<0?0:idx);
    const store=splitStoreKey(v.store).name;
    const comment=v.comment?`<div class="v-comment">💬 ${esc(v.comment)}</div>`:'';
    h+=`<div class="v-entry">
      <span class="v-badge" style="background:${c.bg};color:${c.fg}">${esc(v.manager)}</span>
      <div class="v-info"><div class="v-store">${esc(store)}</div>${comment}</div>
      <button class="v-del" onclick="delVisit('${v.id}')">✕</button>
    </div>`;
  });
  document.getElementById('modalLog').innerHTML=h+'</div>';
}
function renderModalStores(){
  document.getElementById('modalStores').innerHTML=stores.map(s=>{
    const sel=selectedStore===s.id;
    return `<div class="s-item${sel?' sel':''}" onclick="selStore('${s.id}')">
      <input type="checkbox" ${sel?'checked':''} onclick="event.stopPropagation();selStore('${s.id}')">
      <span><span class="s-region">${esc(s.region || '')}</span>${esc(s.name)}</span>
    </div>`;
  }).join('')||'<div class="empty">매장이 없습니다</div>';
}
function selStore(id){selectedStore=selectedStore===id?null:id;renderModalStores()}
async function addVisit(){
  if(!selectedStore){alert('매장을 선택해주세요');return}
  const managerId=document.getElementById('selMgr').value;
  const comment=document.getElementById('visitComment').value.trim();
  await run(db.from('visits').insert({visit_date:currentKey,manager_id:managerId,store_id:selectedStore,comment}));
  selectedStore=null;
  document.getElementById('visitComment').value='';
  await loadAll();
  renderModalLog();renderModalStores();
}
async function delVisit(id){
  await run(db.from('visits').delete().eq('id',id));
  await loadAll();
  renderModalLog();
}
function openStoreDetail(storeId){
  const store=stores.find(s=>s.id===storeId);
  if(!store)return;
  document.getElementById('sdTitle').textContent=`${store.region || ''} | ${store.name}`;
  const allVisits=visitRows.filter(v=>v.store_id===storeId).sort((a,b)=>b.date.localeCompare(a.date));
  const thisMonth=allVisits.filter(v=>v.date.startsWith(monthKey(curYear,curMonth)+'-'));
  const mgrSet=new Set(allVisits.map(v=>v.manager));
  let statsHtml=`
    <div class="sd-stats">
      <div class="sd-stat"><div class="sd-stat-val">${thisMonth.length}</div><div class="sd-stat-lbl">이번 달 방문</div></div>
      <div class="sd-stat"><div class="sd-stat-val">${allVisits.length}</div><div class="sd-stat-lbl">누적 방문</div></div>
      <div class="sd-stat"><div class="sd-stat-val">${mgrSet.size}</div><div class="sd-stat-lbl">방문 관리자 수</div></div>
    </div>`;
  let logHtml='';
  if(allVisits.length===0){
    logHtml='<div class="empty">방문 기록이 없습니다</div>';
  } else {
    logHtml='<div class="sd-log">';
    allVisits.forEach(v=>{
      const idx=mgrIdx(v.manager);const c=mgrColor(idx<0?0:idx);
      const dp=v.date.split('-');const dateStr=`${dp[0]}년 ${parseInt(dp[1])}월 ${parseInt(dp[2])}일`;
      const comment=v.comment?`<div class="sd-entry-comment">💬 ${esc(v.comment)}</div>`:'';
      logHtml+=`<div class="sd-entry">
        <div class="sd-entry-top">
          <span class="sd-entry-date">${dateStr}</span>
          <span class="sd-entry-mgr" style="background:${c.bg};color:${c.fg}">${esc(v.manager)}</span>
        </div>${comment}
      </div>`;
    });
    logHtml+='</div>';
  }
  document.getElementById('sdBody').innerHTML=statsHtml+logHtml;
  document.getElementById('storeOverlay').classList.add('show');
}
function closeModal(id){document.getElementById(id).classList.remove('show')}
async function seedDefaultData(){
  if(!confirm('기본 관리자와 남부산 매장 목록을 추가할까요? 이미 있는 이름은 건너뜁니다.')) return;
  const mgrPayload=DEFAULT_MANAGERS
    .filter(name=>!managers.some(m=>m.name===name))
    .map((name,i)=>({name,sort_order:managers.length+i}));
  const storePayload=DEFAULT_STORES
    .map(splitStoreKey)
    .filter(s=>!stores.some(x=>x.region===s.region&&x.name===s.name))
    .map((s,i)=>({...s,sort_order:stores.length+i}));
  if(mgrPayload.length) await run(db.from('managers').insert(mgrPayload));
  if(storePayload.length) await run(db.from('stores').insert(storePayload));
  await loadAll();
}
function exportData(){
  const data={managers,stores,visits:visitRows,checks,exportedAt:new Date().toISOString()};
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`visit_data_${new Date().toISOString().slice(0,10)}.json`;a.click();
}
async function importData(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=async function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!confirm('JSON 안의 방문 기록을 Supabase에 추가할까요?')) return;
      const mgrMap=new Map(managers.map(m=>[m.name,m.id]));
      const storeMap=new Map(stores.map(s=>[storeKey(s),s.id]));
      const rows=Array.isArray(data.visits) ? data.visits : Object.entries(data.visits || {}).flatMap(([date,vs])=>vs.map(v=>({...v,date})));
      for(const row of rows){
        if(!mgrMap.has(row.manager)){
          const inserted=await run(db.from('managers').insert({name:row.manager}).select().single());
          mgrMap.set(row.manager,inserted.id);
        }
        if(!storeMap.has(row.store)){
          const s=splitStoreKey(row.store);
          const inserted=await run(db.from('stores').insert(s).select().single());
          storeMap.set(row.store,inserted.id);
        }
        await run(db.from('visits').insert({
          visit_date: row.date,
          manager_id: mgrMap.get(row.manager),
          store_id: storeMap.get(row.store),
          comment: row.comment || ''
        }));
      }
      await loadAll();
      alert('데이터를 성공적으로 불러왔습니다.');
    }catch(err){
      console.error(err);
      alert('파일을 읽을 수 없습니다.');
    }
  };
  reader.readAsText(file);e.target.value='';
}
async function clearVisits(){
  if(confirm('모든 방문 기록을 초기화할까요? 관리자와 매장은 유지됩니다.')){
    await run(db.from('visits').delete().neq('id','00000000-0000-0000-0000-000000000000'));
    await run(db.from('store_checks').delete().neq('store_id','00000000-0000-0000-0000-000000000000'));
    await loadAll();
  }
}

document.getElementById('prevM').onclick=()=>{if(curMonth===0){curMonth=11;curYear--}else curMonth--;render()};
document.getElementById('nextM').onclick=()=>{if(curMonth===11){curMonth=0;curYear++}else curMonth++;render()};
document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
    const tab=t.dataset.tab;
    document.getElementById('pane-calendar').style.display=tab==='calendar'?'block':'none';
    document.getElementById('pane-insights').style.display=tab==='insights'?'block':'none';
    document.getElementById('pane-ranking').style.display=tab==='ranking'?'block':'none';
    document.getElementById('pane-settings').style.display=tab==='settings'?'block':'none';
  });
});
document.getElementById('newMgr').addEventListener('keydown',e=>{if(e.key==='Enter')addManager()});
document.getElementById('newStore').addEventListener('keydown',e=>{if(e.key==='Enter')addStore()});
  
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closeModal('overlay')});
document.getElementById('storeOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('storeOverlay'))closeModal('storeOverlay')});

render();
loadAll();
</script>
